# Loads default set of integrations. Do not remove.
default_config:

logger:
  default: info
  logs:
    custom_components.seatemperatures: debug

lovelace:
  mode: yaml
  resources:
    - url: /seatemperatures_frontend/sea-temperatures-card.js
      type: module

template:
  - sensor:
      - name: Acharavi Sea Temperature
        state: "22.5"
        unit_of_measurement: "°C"
        attributes:
          yesterday: "22.0"
          last_week: "21.5"
          average_min: "20.0"
          average_max: "25.0"
          average_avg: "22.5"
          charts: >
            {{ [
              {"date": "2026-05-11", "value": 21.0},
              {"date": "2026-05-12", "value": 21.2},
              {"date": "2026-05-13", "value": 21.5},
              {"date": "2026-05-14", "value": 21.8},
              {"date": "2026-05-15", "value": 21.9},
              {"date": "2026-05-16", "value": 22.0},
              {"date": "2026-05-17", "value": 22.5}
            ] }}
      - name: Lindau Sea Temperature
        state: "15.3"
        unit_of_measurement: "°C"
        attributes:
          yesterday: "14.8"
          last_week: "14.0"
          average_min: "13.0"
          average_max: "18.0"
          average_avg: "15.0"
          charts: >
            {{ [
              {"date": "2026-05-11", "value": 13.5},
              {"date": "2026-05-12", "value": 13.8},
              {"date": "2026-05-13", "value": 14.0},
              {"date": "2026-05-14", "value": 14.2},
              {"date": "2026-05-15", "value": 14.5},
              {"date": "2026-05-16", "value": 14.8},
              {"date": "2026-05-17", "value": 15.3}
            ] }}
