name: Create Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Checkout code
      - uses: actions/checkout@v6

      # 2. Get version from tag
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # 3. Sync versions across files
      - name: Sync version numbers
        run: |
          # Remove 'v' prefix if present (e.g., v1.2.0 -> 1.2.0)
          CLEAN_VERSION=${VERSION#v}
          echo "Setting versions to $CLEAN_VERSION"
          
          # Update Home Assistant manifest
          jq ".version = \"$CLEAN_VERSION\"" custom_components/seatemperatures/manifest.json > tmp.json && mv tmp.json custom_components/seatemperatures/manifest.json
          
          # Update pyproject.toml
          sed -i "s/^version = \".*\"/version = \"$CLEAN_VERSION\"/" pyproject.toml
          
          # Update frontend package.json
          cd frontend && npm version $CLEAN_VERSION --no-git-tag-version --allow-same-version

      # 4. Setup Node and Build Frontend
      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 5. Commit versions and compiled JS back to repository
      - name: Commit version bump and move tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pyproject.toml custom_components/seatemperatures/manifest.json frontend/package.json frontend/package-lock.json custom_components/seatemperatures/sea-temperatures-card.js
          git commit -m "chore: release ${{ env.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
          git tag -f ${{ env.VERSION }}
          git push origin -f refs/tags/${{ env.VERSION }}

      # 4. Create ZIP in repo root (only sea-temperatures folder)
      - name: Create zip archive for HACS
        run: |
          cd custom_components/seatemperatures
          zip -r ../../sea-temperatures.zip .

      # 5. Verify ZIP exists
      - name: List files
        run: ls -l sea-temperatures.zip

      # 6. Create GitHub Release and attach ZIP
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref }}
          name: "Version ${{ env.VERSION }}"
          draft: true
          generate_release_notes: true
          files: sea-temperatures.zip